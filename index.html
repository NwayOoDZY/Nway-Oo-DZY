  const out = [];

    if (vals[i] > 0 && COL_MAP[i]) out.push({ donorId: id, year: COL_MAP[i][0], month: COL_MAP[i][1], amount: vals[i] });

    db.ref('donors').on('value', function(snap) {
      var val = snap.val();
      if (val && Array.isArray(val)) setDonors(val);
    });
    db.ref('contribs').on('value', function(snap) {
      var val = snap.val();
      if (val && Array.isArray(val)) setContribs(val);
    });
    db.ref('photos').on('value', function(snap) {
      var val = snap.val();
      setPhotos(val || {});
    });
    return function() {
      db.ref('donors').off();
      db.ref('contribs').off();
      db.ref('photos').off();
    };
  }, []);

  function showToast(msg, isErr) {
    setToast({ msg, isErr: !!isErr });
    setTimeout(function() { setToast(null); }, 2500);
  }

  const totals = useMemo(function() {
    const m = {};
    for (const c of contribs) {
      if (c && c.donorId) m[c.donorId] = (m[c.donorId] || 0) + (c.amount || 0);
    }
    return m;
  }, [contribs]);

  const grand = useMemo(function() {
    return Object.values(totals).reduce(function(a,b){ return a+b; }, 0);
  }, [totals]);

  function addDonor(name) {
    const id = Math.max(0, ...donors.map(function(d){return d.id;})) + 1;
    const updated = [...donors, { id, name, active: true }];
    setDonors(updated);
    db.ref('donors').set(updated);
    showToast("Added");
  }
  function delDonor(id) {
    const nd = donors.filter(function(d){return d.id!==id;});
    const nc = contribs.filter(function(c){return c && c.donorId!==id;});
    setDonors(nd);
    setContribs(nc);
    db.ref('donors').set(nd);
    db.ref('contribs').set(nc);
    showToast("Deleted", true);
  }
  function toggleActive(id) {
    const nd = donors.map(function(d){return d.id===id?{...d,active:!d.active}:d;});
    setDonors(nd);
    db.ref('donors').set(nd);
  }
  function upsert(donorId, year, month, amount) {
    var nc;
    const ex = contribs.find(function(c){return c && c.donorId===donorId&&c.year===year&&c.month===month;});
    if (ex) {
      nc = contribs.map(function(c){return c && c.donorId===donorId&&c.year===year&&c.month===month?{...c,amount}:c;});
    } else {
      nc = [...contribs, {donorId,year,month,amount}];
    }
    setContribs(nc);
    db.ref('contribs').set(nc);
    showToast("Saved");
  }
  function delContrib(donorId, year, month) {
    const nc = contribs.filter(function(c){return c && !(c.donorId===donorId&&c.year===year&&c.month===month);});
    setContribs(nc);
    db.ref('contribs').set(nc);
    showToast("Deleted", true);
  }

    const k = donorId + "-" + year + "-" + month;
    const np = { ...photos };
    if (url) np[k] = url; else delete np[k];
    setPhotos(np);
    db.ref('photos').set(np);
    showToast(url ? "Photo saved" : "Photo deleted", !url);

  const active = donors.filter(function(d){return d && d.active;}).length;
  const top5 = [...donors].sort(function(a,b){return (totals[b.id]||0)-(totals[a.id]||0);}).slice(0,5);

  for (const c of contribs) {
