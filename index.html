<!DOCTYPE html>
<html lang="my">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nway Oo DZY - Donor Hub</title>
  <meta name="theme-color" content="#6366f1" />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Myanmar:wght@400;600;700&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: "Noto Sans Myanmar", "Segoe UI", sans-serif; background: #f8fafc; }
    #root { min-height: 100vh; }
    @media (max-width: 640px) {
      aside { width: 52px !important; }
      aside span:last-child { display: none !important; }
    }
    .loading-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; color: #6366f1; font-weight: bold; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script type="text/babel">
  const { useState, useEffect, useMemo } = React;
  const fmt = (n) => (n || 0).toLocaleString() + " MMK";

  const sheetUrl = 'https://docs.google.com/spreadsheets/d/1LpTBZvw43V7EqiWmMYukhOXf2KImMG-vGGidSmgyjR8/export?format=csv';
  const sheetEditUrl = 'https://docs.google.com/spreadsheets/d/1LpTBZvw43V7EqiWmMYukhOXf2KImMG-vGGidSmgyjR8/edit?pli=1&gid=0#gid=0';

  function App() {
    const [donors, setDonors] = useState([]);
    const [contribs, setContribs] = useState([]);
    const [loading, setLoading] = useState(true);
    const [page, setPage] = useState("dashboard");
    const [selDonor, setSelDonor] = useState(null);
    const [search, setSearch] = useState("");
    const [adminOk, setAdminOk] = useState(false);
    const [adminPw, setAdminPw] = useState("");
    const [adminErr, setAdminErr] = useState(false);

    useEffect(() => {
      fetch(sheetUrl + '&t=' + new Date().getTime())
        .then(res => { if(!res.ok) throw new Error("Net Err"); return res.text(); })
        .then(csvData => {
          const rows = csvData.split('\n');
          const newDonors = [];
          const newContribs = [];
          for (let i = 1; i < rows.length; i++) {
              const row = rows[i].trim();
              if (!row) continue;
              const cols = row.split(',');
              if (cols.length >= 3) {
                  const id = parseInt(cols[0]) || i;
                  const name = cols[1];
                  const amount = parseInt(cols[2].replace(/[^0-9]/g, '')) || 0;
                  newDonors.push({ id: id, name: name, active: true });
                  if(amount > 0) {
                      newContribs.push({ donorId: id, year: 2026, month: 4, amount: amount });
                  }
              }
          }
          setDonors(newDonors);
          setContribs(newContribs);
          setLoading(false);
        })
        .catch(err => {
          console.error(err);
          setLoading(false);
          alert("Google Sheets မှ ဒေတာများ ဆွဲယူ၍ မရပါ။ (Google Sheets ကို Anyone with the link (Public) ဖွင့်ထားရန် လိုအပ်ပါသည်)");
        });
    }, []);

    const totals = useMemo(() => {
      const m = {};
      for (const c of contribs) m[c.donorId] = (m[c.donorId] || 0) + c.amount;
      return m;
    }, [contribs]);

    const grand = useMemo(() => Object.values(totals).reduce((a,b)=>a+b, 0), [totals]);

    function tryLogin() {
      if (adminPw.trim() === "zayyar@100") {
        setAdminOk(true); setAdminErr(false);
      } else {
        setAdminErr(true);
      }
    }

    if (loading) return <div className="loading-screen">Google Sheets မှ အချက်အလက်များ ရယူနေပါသည်...</div>;

    const filtered = donors.filter(d => d.name.toLowerCase().includes(search.toLowerCase()));

    return (
      <div style={S.root}>
        <aside style={S.sidebar}>
          <div style={S.logo}>
            <div style={{width:38,height:38,borderRadius:"50%",background:"#6366f1",display:"flex",alignItems:"center",justifyContent:"center",color:"#fff",fontWeight:"bold",flexShrink:0}}>N</div>
            <span style={S.logoTxt}>Nway Oo DZY</span>
          </div>
          {[["dashboard","Dashboard","📊"],["donors","Donors","👥"],["reports","Reports","📋"],["admin","Admin","⚙️"]].map(item => (
            <button key={item[0]} style={{...S.navBtn,...(page===item[0]||(page==="detail"&&item[0]==="donors")?S.navActive:{})}}
              onClick={()=>{setPage(item[0]);if(item[0]!=="detail")setSelDonor(null);}}>
              <span>{item[2]}</span><span>{item[1]}</span>
            </button>
          ))}
        </aside>
        <main style={S.main}>
          {page==="dashboard"&&<Dashboard donors={donors} totals={totals} grand={grand} goDetail={d=>{setSelDonor(d);setPage("detail");}} />}
          {page==="donors"&&<DonorList donors={filtered} totals={totals} search={search} setSearch={setSearch} goDetail={d=>{setSelDonor(d);setPage("detail");}} />}
          {page==="detail"&&selDonor&&<Detail donor={selDonor} contribs={contribs} back={()=>setPage("donors")} />}
          {page==="reports"&&<Reports donors={donors} totals={totals} grand={grand} />}
          {page==="admin"&&<Admin adminOk={adminOk} adminPw={adminPw} adminErr={adminErr} setAdminPw={setAdminPw} tryLogin={tryLogin} />}
        </main>
      </div>
    );
  }

  function Dashboard({ donors, totals, grand, goDetail }) {
    const active = donors.filter(d=>d.active).length;
    const top5 = [...donors].sort((a,b)=>(totals[b.id]||0)-(totals[a.id]||0)).slice(0,5);
    return (
      <div style={S.page}>
        <h1 style={S.h1}>Dashboard</h1>
        <div style={S.row3}>
          {[[fmt(grand),"Total","#6366f1"],[active+" Donors","Members","#f59e0b"]].map(x => (
            <div key={x[1]} style={S.stat}><div style={{...S.statV,color:x[2]}}>{x[0]}</div><div style={S.statL}>{x[1]}</div></div>
          ))}
        </div>
        <div style={S.card}>
          <div style={S.cardH}>Top 5 Donors</div>
          {top5.map((d,i) => (
            <div key={d.id} style={S.topRow} onClick={()=>goDetail(d)}>
              <span style={S.rank}>{i+1}</span>
              <span style={{flex:1,fontWeight:600}}>{d.name}</span>
              <span style={{color:"#6366f1",fontWeight:700}}>{fmt(totals[d.id]||0)}</span>
            </div>
          ))}
        </div>
      </div>
    );
  }

  function DonorList({ donors, totals, search, setSearch, goDetail }) {
    return (
      <div style={S.page}>
        <h1 style={S.h1}>Donors</h1>
        <input style={S.input} placeholder="Search by name..." value={search} onChange={e=>setSearch(e.target.value)} />
        <div style={S.grid}>
          {donors.map(d => (
            <div key={d.id} style={S.dCard} onClick={()=>goDetail(d)}>
              <div style={{display:"flex",justifyContent:"space-between",marginBottom:8}}>
                <span style={{fontWeight:700,fontSize:13,color:"#1e293b",lineHeight:1.3,flex:1,marginRight:6}}>{d.name}</span>
                <span style={{...S.badge,background:d.active?"#dcfce7":"#f1f5f9",color:d.active?"#16a34a":"#64748b"}}>{d.active?"active":"off"}</span>
              </div>
              <div style={{fontSize:17,fontWeight:800,color:"#6366f1"}}>{fmt(totals[d.id]||0)}</div>
              <div style={{fontSize:11,color:"#94a3b8",marginTop:2}}>Total Paid</div>
            </div>
          ))}
        </div>
      </div>
    );
  }

  function Detail({ donor, contribs, back }) {
    const total = contribs.filter(c=>c.donorId===donor.id).reduce((s,c)=>s+c.amount,0);
    return (
      <div style={S.page}>
        <button style={S.backBtn} onClick={back}>Back</button>
        <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:20}}>
          <h1 style={{...S.h1,margin:0}}>{donor.name}</h1>
          <span style={{...S.badge,background:"#dcfce7",color:"#16a34a"}}>{donor.active?"Active":"Inactive"}</span>
        </div>
        <div style={S.row3}>
          <div style={{...S.stat,flex:1}}><div style={{...S.statV,fontSize:16,color:"#6366f1"}}>{fmt(total)}</div><div style={S.statL}>Total Paid</div></div>
        </div>
        <div style={S.card}>
          <div style={S.cardH}>Records</div>
          <div style={S.monthRow}>
            <div style={{flex:1,minWidth:0}}>
              <div style={{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}}>
                <span style={{fontWeight:700,color:"#334155",minWidth:80}}>Total Record</span>
                <span style={{fontWeight:800,color:"#6366f1",fontSize:15}}>{fmt(total)}</span>
              </div>
            </div>
          </div>
        </div>
      </div>
    );
  }

  function Reports({ donors, totals }) {
    const rows=donors.map(d=>({...d,t:(totals[d.id]||0)})).filter(d=>d.t>0).sort((a,b)=>b.t-a.t);
    const ft=rows.reduce((s,d)=>s+d.t,0);
    function dlCSV(){
      const body=rows.map((d,i)=>(i+1)+","+d.name+","+d.t).join("\n");
      const a=document.createElement("a");
      a.href=URL.createObjectURL(new Blob(["No,Name,Total (MMK)\n"+body],{type:"text/csv"}));
      a.download="donors-report.csv";a.click();
    }
    return (
      <div style={S.page}>
        <h1 style={S.h1}>Reports</h1>
        <div style={{display:"flex",gap:10,marginBottom:16,flexWrap:"wrap",alignItems:"center"}}>
          <button style={S.btnP} onClick={dlCSV}>Download CSV</button>
        </div>
        <div style={{...S.stat,marginBottom:16}}>
          <div style={{...S.statV,color:"#6366f1"}}>{fmt(ft)}</div>
          <div style={S.statL}>Total Amount</div>
        </div>
        <div style={S.card}>
          <table style={{width:"100%",borderCollapse:"collapse"}}>
            <thead><tr style={{background:"#f8fafc"}}><th style={S.th}>#</th><th style={S.th}>Name</th><th style={S.th}>Amount</th></tr></thead>
            <tbody>
              {rows.map((d,i)=>(
                <tr key={d.id} style={{borderBottom:"1px solid #f1f5f9"}}><td style={S.td}>{i+1}</td><td style={S.td}>{d.name}</td><td style={{...S.td,color:"#6366f1",fontWeight:700}}>{fmt(d.t)}</td></tr>
              ))}
            </tbody>
          </table>
        </div>
      </div>
    );
  }

  function Admin({ adminOk, adminPw, adminErr, setAdminPw, tryLogin }) {
    if (!adminOk) {
      return (
        <div style={{maxWidth:340,margin:"60px auto",padding:20}}>
          <div style={S.card}>
            <h2 style={{textAlign:"center",marginBottom:20}}>Admin Login</h2>
            <input style={S.input} type="password" placeholder="Password" value={adminPw}
              onChange={e=>setAdminPw(e.target.value)} onKeyDown={e=>{if(e.key==="Enter")tryLogin();}} />
            {adminErr&&<div style={{color:"#ef4444",fontSize:13}}>Wrong password</div>}
            <button style={{...S.btnP,width:"100%",marginTop:10}} onClick={tryLogin}>Login</button>
          </div>
        </div>
      );
    }
    return (
      <div style={S.page}>
        <h1 style={{...S.h1,marginBottom:20}}>Admin Panel</h1>
        <div style={{...S.card, textAlign: "center", padding: "40px 20px"}}>
           <h3 style={{color: "#334155", marginBottom: 15, fontSize: 18}}>Google Sheets သို့ သွားရန်</h3>
           <p style={{color: "#64748b", fontSize: 14, marginBottom: 25, lineHeight: 1.6}}>
             အလှူရှင်စာရင်းများ ထပ်မံထည့်သွင်းရန် သို့မဟုတ် ပြင်ဆင်ရန် အောက်ပါခလုတ်ကို နှိပ်ပါ။<br/>
             (မှတ်ချက် - Google Sheets ကို ဝဘ်ဆိုဒ်နှင့် တိုက်ရိုက်ချိတ်ဆက်ထားသောကြောင့် ဒေတာများကို Google Sheets တွင်သာ ရိုက်သွင်းရမည်ဖြစ်ပါသည်။)
           </p>
           <a href={sheetEditUrl} target="_blank" rel="noopener noreferrer" style={{...S.btnP, display: "inline-block", textDecoration: "none", padding: "12px 24px", fontSize: 15}}>
              Google Sheets ဖွင့်ရန် 📝
           </a>
        </div>
      </div>
    );
  }

  const S = {
    root:     {display:"flex",minHeight:"100vh",background:"#f8fafc",fontFamily:"'Noto Sans Myanmar','Segoe UI',sans-serif"},
    sidebar:  {width:190,background:"#1e1b4b",display:"flex",flexDirection:"column",padding:"20px 0",gap:2,flexShrink:0},
    logo:     {display:"flex",alignItems:"center",gap:8,padding:"0 16px 20px",borderBottom:"1px solid #312e81"},
    logoTxt:  {color:"#c7d2fe",fontWeight:700,fontSize:16},
    navBtn:   {display:"flex",alignItems:"center",gap:10,padding:"11px 16px",background:"transparent",border:"none",color:"#a5b4fc",fontSize:14,cursor:"pointer"},
    navActive:{background:"#312e81",color:"#fff",borderLeft:"3px solid #818cf8"},
    main:     {flex:1,overflow:"auto",position:"relative"},
    page:     {maxWidth:900,margin:"0 auto",padding:"28px 20px"},
    h1:       {fontSize:24,fontWeight:800,color:"#1e293b",marginBottom:20},
    row3:     {display:"flex",gap:14,marginBottom:20,flexWrap:"wrap"},
    stat:     {flex:1,minWidth:130,background:"#fff",borderRadius:12,padding:"16px 20px",boxShadow:"0 1px 4px rgba(0,0,0,.07)"},
    statV:    {fontSize:20,fontWeight:800,marginBottom:4},
    statL:    {fontSize:12,color:"#94a3b8"},
    card:     {background:"#fff",borderRadius:14,padding:"20px",boxShadow:"0 1px 4px rgba(0,0,0,.07)",marginBottom:18},
    cardH:    {fontSize:15,fontWeight:700,color:"#334155",marginBottom:14},
    grid:     {display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(175px,1fr))",gap:14},
    dCard:    {background:"#fff",borderRadius:12,padding:16,boxShadow:"0 1px 4px rgba(0,0,0,.07)",cursor:"pointer"},
    badge:    {padding:"2px 8px",borderRadius:99,fontSize:11,fontWeight:600,whiteSpace:"nowrap",flexShrink:0},
    topRow:   {display:"flex",alignItems:"center",gap:8,padding:"9px 0",borderBottom:"1px solid #f1f5f9"},
    monthRow: {display:"flex",alignItems:"flex-start",padding:"14px 0",borderBottom:"1px solid #f1f5f9"},
    rank:     {width:24,height:24,background:"#6366f1",color:"#fff",borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center",fontSize:12,fontWeight:700,flexShrink:0},
    input:    {width:"100%",padding:"10px 14px",borderRadius:10,border:"1.5px solid #e2e8f0",fontSize:14,marginBottom:16,boxSizing:"border-box",outline:"none"},
    sel:      {padding:"8px 12px",borderRadius:8,border:"1.5px solid #e2e8f0",fontSize:13,background:"#fff",outline:"none"},
    btnP:     {padding:"9px 18px",background:"#6366f1",color:"#fff",border:"none",borderRadius:8,fontWeight:600,fontSize:13,cursor:"pointer"},
    btnS:     {padding:"5px 10px",background:"#f1f5f9",color:"#334155",border:"none",borderRadius:6,fontSize:12,cursor:"pointer"},
    backBtn:  {background:"none",border:"none",color:"#6366f1",cursor:"pointer",fontSize:14,marginBottom:12,padding:0},
    th:       {padding:"8px 12px",textAlign:"left",fontSize:12,fontWeight:700,color:"#94a3b8"},
    td:       {padding:"10px 12px",fontSize:14,color:"#334155"}
  };

  const root = ReactDOM.createRoot(document.getElementById("root"));
  root.render(React.createElement(App));
  </script>
</body>
</html>
