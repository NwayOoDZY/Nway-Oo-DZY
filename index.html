  const out = [];

function pKey(donorId, year, month) { return donorId + "-" + year + "-" + month; }

function toDirectUrl(url) {
  if (!url) return url;
  const m1 = url.match(/drive\.google\.com\/file\/d\/([^/]+)/);
  if (m1) return "https://drive.google.com/uc?export=view&id=" + m1[1];
  const m2 = url.match(/drive\.google\.com\/open\?id=([^&]+)/);
  if (m2) return "https://drive.google.com/uc?export=view&id=" + m2[1];
  return url;
}

function loadState() {
  try {
    const d = JSON.parse(localStorage.getItem(SK_D));
    const c = JSON.parse(localStorage.getItem(SK_C));
    const p = JSON.parse(localStorage.getItem(SK_P));
    return { donors: d || SEED_DONORS, contribs: c || SEED_CONTRIBS, photos: p || {} };
  } catch(e) {
    return { donors: SEED_DONORS, contribs: SEED_CONTRIBS, photos: {} };
  }
}
function saveAll(d, c, p) {
  try {
    localStorage.setItem(SK_D, JSON.stringify(d));
    localStorage.setItem(SK_C, JSON.stringify(c));
    localStorage.setItem(SK_P, JSON.stringify(p));
  } catch(e) {}
}

function dlImage(url, name) {
  const a = document.createElement("a");
  a.href = url;

  a.click();

function Dashboard({ donors, totals, grand, contribs, goDetail }) {
  const active = donors.filter(function(d){return d.active;}).length;
  const top5 = [...donors].sort(function(a,b){return (totals[b.id]||0)-(totals[a.id]||0);}).slice(0,5);
  const mm = {};
  for (const c of contribs) { const k=c.year+"-"+String(c.month).padStart(2,"0"); mm[k]=(mm[k]||0)+c.amount; }
  const ents = Object.entries(mm).sort(function(a,b){return a[0]<b[0]?-1:1;});
  const maxV = Math.max(...ents.map(function(e){return e[1];}),1);
  return (
    <div style={S.page}>
      <h1 style={S.h1}>Dashboard</h1>
      <div style={S.row3}>
        {[[fmt(grand),"Total","#6366f1"],[active+" Donors","Members","#f59e0b"],[ents.length+" Months","Period","#10b981"]].map(function(x){
          return <div key={x[1]} style={S.stat}><div style={{...S.statV,color:x[2]}}>{x[0]}</div><div style={S.statL}>{x[1]}</div></div>;
        })}
      </div>
      <div style={S.card}>
        <div style={S.cardH}>Monthly Contributions</div>
        <div style={{display:"flex",alignItems:"flex-end",gap:6,height:130,overflowX:"auto",paddingBottom:4}}>
          {ents.map(function(e){
            const k=e[0],v=e[1],parts=k.split("-"),yr=parts[0],mo=parseInt(parts[1]),h=Math.max(6,Math.round((v/maxV)*100));
            return (
              <div key={k} style={{display:"flex",flexDirection:"column",alignItems:"center",minWidth:38}}>
                <div style={{fontSize:9,color:"#6366f1",marginBottom:2}}>{Math.round(v/1000)}k</div>
                <div style={{width:26,height:h,background:"linear-gradient(180deg,#818cf8,#4f46e5)",borderRadius:"4px 4px 0 0"}} />
                <div style={{fontSize:9,color:"#94a3b8",marginTop:2,textAlign:"center"}}>{MN[mo-1]}<br />{yr}</div>
              </div>
            );
          })}
        </div>
      </div>
      <div style={S.card}>
        <div style={S.cardH}>Top 5 Donors</div>
        {top5.map(function(d,i){
          return (
            <div key={d.id} style={S.topRow} onClick={function(){goDetail(d);}}>
              <span style={S.rank}>{i+1}</span>
              <span style={{flex:1,fontWeight:600}}>{d.name}</span>
              <span style={{color:"#6366f1",fontWeight:700}}>{fmt(totals[d.id]||0)}</span>
            </div>
          );
        })}
      </div>
    </div>
  );
}

function DonorList({ donors, totals, search, setSearch, goDetail }) {
  return (
    <div style={S.page}>
      <h1 style={S.h1}>Donors</h1>
      <input style={S.input} placeholder="Search by name..." value={search} onChange={function(e){setSearch(e.target.value);}} />
      <div style={S.grid}>
        {donors.map(function(d){
          return (
            <div key={d.id} style={S.dCard} onClick={function(){goDetail(d);}}>
              <div style={{display:"flex",justifyContent:"space-between",marginBottom:8}}>
                <span style={{fontWeight:700,fontSize:13,color:"#1e293b",lineHeight:1.3,flex:1,marginRight:6}}>{d.name}</span>
                <span style={{...S.badge,background:d.active?"#dcfce7":"#f1f5f9",color:d.active?"#16a34a":"#64748b"}}>{d.active?"active":"off"}</span>
              </div>
              <div style={{fontSize:17,fontWeight:800,color:"#6366f1"}}>{fmt(totals[d.id]||0)}</div>
              <div style={{fontSize:11,color:"#94a3b8",marginTop:2}}>Total</div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

function Detail({ donor, contribs, photos, upsert, del, back, adminOk, setPhoto }) {
  const mine = contribs.filter(function(c){return c.donorId===donor.id;})
    .sort(function(a,b){return a.year!==b.year?a.year-b.year:a.month-b.month;});
  const total = mine.reduce(function(s,c){return s+c.amount;},0);
  const avg = mine.length?Math.round(total/mine.length):0;

  const [yr,setYr] = useState(2026);
  const [mo,setMo] = useState(new Date().getMonth()+1);
  const [amt,setAmt] = useState("");
  const [editK,setEditK] = useState(null);
  const [editA,setEditA] = useState("");
  const [editPK,setEditPK] = useState(null);
  const [editPUrl,setEditPUrl] = useState("");
  const [lightbox,setLightbox] = useState(null);

  function doAdd() {
    const a = parseInt(String(amt).replace(/,/g,""));
    if (!a||a<=0) return;
    upsert(donor.id,Number(yr),Number(mo),a);
    setAmt("");
  }

  return (
    <div style={S.page}>
      {lightbox&&(
        <div style={S.lbBg} onClick={function(){setLightbox(null);}}>
          <div style={{position:"relative"}} onClick={function(e){e.stopPropagation();}}>
            <img src={lightbox} alt="cert"
              style={{maxWidth:"88vw",maxHeight:"80vh",borderRadius:12,boxShadow:"0 8px 40px rgba(0,0,0,.6)",display:"block"}} />
            <div style={{display:"flex",gap:10,justifyContent:"center",marginTop:12}}>
              <button style={{...S.btnP,fontSize:13}} onClick={function(){dlImage(lightbox,"certificate.jpg");}}>Download</button>
              <button style={{...S.btnS,fontSize:13}} onClick={function(){setLightbox(null);}}>Close</button>
            </div>
          </div>
        </div>

      <button style={S.backBtn} onClick={back}>Back</button>
      <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:20}}>
        <h1 style={{...S.h1,margin:0}}>{donor.name}</h1>
        <span style={{...S.badge,background:"#dcfce7",color:"#16a34a"}}>{donor.active?"Active":"Inactive"}</span>
      </div>
      <div style={S.row3}>
        {[[fmt(total),"Total"],[fmt(avg),"Avg/Month"],[mine.length+" Months","Period"]].map(function(x){
          return <div key={x[1]} style={{...S.stat,flex:1}}><div style={{...S.statV,fontSize:16,color:"#6366f1"}}>{x[0]}</div><div style={S.statL}>{x[1]}</div></div>;
        })}
      </div>
      {adminOk&&<div style={S.card}>
        <div style={S.cardH}>Add Contribution</div>
        <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
          <select style={S.sel} value={yr} onChange={function(e){setYr(e.target.value);}}>
            {[2024,2025,2026,2027].map(function(y){return <option key={y}>{y}</option>;})}
          </select>
          <select style={S.sel} value={mo} onChange={function(e){setMo(e.target.value);}}>
            {MN.map(function(m,i){return <option key={i} value={i+1}>{m}</option>;})}
          </select>
          <input style={{...S.sel,flex:1,minWidth:110}} placeholder="Amount (MMK)" value={amt}
            onChange={function(e){setAmt(e.target.value);}} onKeyDown={function(e){if(e.key==="Enter")doAdd();}} />
          <button style={S.btnP} onClick={doAdd}>Add</button>
        </div>
      </div>}
      <div style={S.card}>
        <div style={S.cardH}>Monthly Records</div>
        {mine.length===0?(
          <div style={{color:"#94a3b8",textAlign:"center",padding:20}}>No records yet</div>
        ):(
          <div>
            {mine.map(function(c){
              const k=c.year+"-"+c.month;
              const pk=pKey(donor.id,c.year,c.month);
              const photoUrl=photos[pk];
              const isEP=editPK===k;
              return (
                <div key={k} style={S.monthRow}>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}}>
                      <span style={{fontWeight:700,color:"#334155",minWidth:80}}>{MN[c.month-1]} {c.year}</span>
                      {editK===k?(
                        <span style={{display:"flex",gap:6,alignItems:"center"}}>
                          <input style={{...S.sel,width:110}} value={editA} autoFocus
                            onChange={function(e){setEditA(e.target.value);}}
                            onKeyDown={function(e){if(e.key==="Enter"){upsert(donor.id,c.year,c.month,parseInt(editA.replace(/,/g,"")));setEditK(null);}}} />
                          <button style={S.btnS} onClick={function(){upsert(donor.id,c.year,c.month,parseInt(editA.replace(/,/g,"")));setEditK(null);}}>OK</button>
                          <button style={S.btnS} onClick={function(){setEditK(null);}}>X</button>
                        </span>
                      ):(
                        <span style={{fontWeight:800,color:"#6366f1",fontSize:15}}>{fmt(c.amount)}</span>
                      )}
                      <span style={{display:"flex",gap:5,marginLeft:"auto"}}>
                        {adminOk&&editK!==k&&<button style={S.btnS} onClick={function(){setEditK(k);setEditA(String(c.amount));}}>Edit</button>}
                        {adminOk&&<button style={{...S.btnS,background:"#fee2e2",color:"#dc2626"}} onClick={function(){del(donor.id,c.year,c.month);}}>Del</button>}
                      </span>
                    </div>
                    {adminOk&&isEP&&(
                      <div style={{marginTop:8,display:"flex",gap:6,flexWrap:"wrap",alignItems:"center"}}>
                        <label style={{...S.btnP,cursor:"pointer",fontSize:12,padding:"7px 14px"}}>
                          Choose Photo
                          <input type="file" accept="image/*" style={{display:"none"}} onChange={function(e){
                            const f=e.target.files[0];if(!f)return;
                            const r=new FileReader();
                            r.onload=function(ev){
                              setPhoto(donor.id,c.year,c.month,ev.target.result);
                              setEditPK(null);
                            };
                            r.readAsDataURL(f);
                          }} />
                        </label>
                        {photoUrl&&<button style={{...S.btnS,background:"#fee2e2",color:"#dc2626"}} onClick={function(){setPhoto(donor.id,c.year,c.month,"");setEditPK(null);}}>Remove</button>}
                        <button style={S.btnS} onClick={function(){setEditPK(null);}}>Cancel</button>
                      </div>
                    )}
                    {adminOk&&!isEP&&(
                      <button style={{...S.btnS,marginTop:6,fontSize:11}} onClick={function(){setEditPK(k);setEditPUrl("");}}>
                        {photoUrl?"Edit photo":"+ Add photo"}
                      </button>
                    )}
                  </div>
                  {photoUrl&&(
                    <div style={{flexShrink:0,marginLeft:12,display:"flex",flexDirection:"column",alignItems:"center",gap:6}}>
                      <img src={photoUrl} alt="cert"
                        style={{width:80,height:80,objectFit:"cover",borderRadius:10,cursor:"pointer",border:"2px solid #6366f1",boxShadow:"0 2px 8px rgba(99,102,241,.2)"}}
                        onClick={function(){setLightbox(photoUrl);}} />
                      <button style={{...S.btnS,fontSize:10,padding:"3px 8px"}} onClick={function(){dlImage(photoUrl,donor.name+"-"+MN[c.month-1]+c.year+".jpg");}}>
                        Download
                      </button>
                    </div>
                  )}
                </div>
              );
            })}
          </div>
        )}
      </div>
    </div>
  );
}

function Reports({ donors, contribs, totals, grand }) {
  const [fy,setFy] = useState("all");
  const [fm,setFm] = useState("all");
  const years = [...new Set(contribs.map(function(c){return c.year;}))].sort();
  const filtered = contribs.filter(function(c){
    if(fy!=="all"&&c.year!==Number(fy))return false;
    if(fm!=="all"&&c.month!==Number(fm))return false;
    return true;
  });
  const bd={};
  for(const c of filtered) bd[c.donorId]=(bd[c.donorId]||0)+c.amount;
  const rows=donors.map(function(d){return{...d,t:bd[d.id]||0};}).filter(function(d){return d.t>0;}).sort(function(a,b){return b.t-a.t;});
  const ft=rows.reduce(function(s,d){return s+d.t;},0);
  function dlCSV(){
    const body=rows.map(function(d,i){return(i+1)+","+d.name+","+d.t;}).join("\n");
    const a=document.createElement("a");
    a.href=URL.createObjectURL(new Blob(["No,Name,Total (MMK)\n"+body],{type:"text/csv"}));
    a.download="donors-report.csv";a.click();
  }
  return (
    <div style={S.page}>
      <h1 style={S.h1}>Reports</h1>
      <div style={{display:"flex",gap:10,marginBottom:16,flexWrap:"wrap",alignItems:"center"}}>
        <select style={S.sel} value={fy} onChange={function(e){setFy(e.target.value);}}>
          <option value="all">All Years</option>
          {years.map(function(y){return <option key={y} value={y}>{y}</option>;})}
        </select>
        <select style={S.sel} value={fm} onChange={function(e){setFm(e.target.value);}}>
          <option value="all">All Months</option>
          {MN.map(function(m,i){return <option key={i} value={i+1}>{m}</option>;})}
        </select>
        <button style={S.btnP} onClick={dlCSV}>Download CSV</button>
      </div>
      <div style={{...S.stat,marginBottom:16}}>
        <div style={{...S.statV,color:"#6366f1"}}>{fmt(ft)}</div>
        <div style={S.statL}>Filtered Total</div>
      </div>
      <div style={S.card}>
        <table style={{width:"100%",borderCollapse:"collapse"}}>
          <thead><tr style={{background:"#f8fafc"}}><th style={S.th}>#</th><th style={S.th}>Name</th><th style={S.th}>Amount</th></tr></thead>
          <tbody>
            {rows.map(function(d,i){
              return <tr key={d.id} style={{borderBottom:"1px solid #f1f5f9"}}><td style={S.td}>{i+1}</td><td style={S.td}>{d.name}</td><td style={{...S.td,color:"#6366f1",fontWeight:700}}>{fmt(d.t)}</td></tr>;
            })}
          </tbody>
        </table>
      </div>
    </div>
  );
}

function Admin({ donors, contribs, photos, totals, adminOk, adminPw, adminErr, setAdminPw, tryLogin, addDonor, delDonor, toggleActive, upsert, delContrib, setPhoto, resetToSeed }) {
  const [newName,setNewName] = useState("");
  const [confirmDel,setConfirmDel] = useState(null);
  const [tab,setTab] = useState("donors");
  const [selId,setSelId] = useState(null);
  const [yr,setYr] = useState(2026);
  const [mo,setMo] = useState(new Date().getMonth()+1);
  const [amt,setAmt] = useState("");
  const [pUrl,setPUrl] = useState("");

  if (!adminOk) {
    return (
      <div style={{maxWidth:340,margin:"60px auto",padding:20}}>
        <div style={S.card}>
          <h2 style={{textAlign:"center",marginBottom:20}}>Admin Login</h2>
          <input style={S.input} type="password" placeholder="Password" value={adminPw}
            onChange={function(e){setAdminPw(e.target.value);}}
            onKeyDown={function(e){if(e.key==="Enter")tryLogin();}} />
          {adminErr&&<div style={{color:"#ef4444",fontSize:13}}>Wrong password</div>}
          <button style={{...S.btnP,width:"100%",marginTop:10}} onClick={tryLogin}>Login</button>
          <div style={{fontSize:11,color:"#94a3b8",textAlign:"center",marginTop:8}}>Admin access only</div>
        </div>
      </div>
    );
  }

  const selContribs = selId
    ? contribs.filter(function(c){return c.donorId===selId;}).sort(function(a,b){return a.year!==b.year?a.year-b.year:a.month-b.month;})
    : [];

  return (
    <div style={S.page}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}>
        <h1 style={{...S.h1,margin:0}}>Admin Panel</h1>
        <button style={{...S.btnS,background:"#fef3c7",color:"#92400e"}}
          onClick={function(){ if(window.confirm("Reset all data to seed?")) resetToSeed(); }}>
          Reset
        </button>
      </div>
      <div style={{display:"flex",gap:8,marginBottom:20,flexWrap:"wrap"}}>
        {[["donors","Donors"],["contrib","Contributions"],["photo","Photos"],["csv","CSV"]].map(function(x){
          return <button key={x[0]} style={{...S.btnS,...(tab===x[0]?{background:"#6366f1",color:"#fff"}:{})}} onClick={function(){setTab(x[0]);}}>{x[1]}</button>;
        })}
      </div>

      {tab==="donors"&&(
        <div>
          <div style={S.card}>
            <div style={S.cardH}>Add Donor</div>
            <div style={{display:"flex",gap:8}}>
              <input style={{...S.input,margin:0,flex:1}} placeholder="Name" value={newName}
                onChange={function(e){setNewName(e.target.value);}}
                onKeyDown={function(e){if(e.key==="Enter"&&newName.trim()){addDonor(newName.trim());setNewName("");}}} />
              <button style={S.btnP} onClick={function(){if(newName.trim()){addDonor(newName.trim());setNewName("");}}}>Add</button>
            </div>
          </div>
          <div style={S.card}>
            <div style={S.cardH}>{"Donor List ("+donors.length+")"}</div>
            {donors.map(function(d){
              return (
                <div key={d.id} style={{...S.topRow,alignItems:"center"}}>
                  <span style={{flex:1}}>{d.name}</span>
                  <span style={{color:"#6366f1",fontSize:12,marginRight:8}}>{fmt(totals[d.id]||0)}</span>
                  <button style={{...S.btnS,marginRight:5,background:d.active?"#dcfce7":"#f1f5f9",color:d.active?"#16a34a":"#64748b"}} onClick={function(){toggleActive(d.id);}}>{d.active?"On":"Off"}</button>
                  <button style={{...S.btnS,background:"#fee2e2",color:"#dc2626"}} onClick={function(){setConfirmDel(d.id);}}>Del</button>
                  {confirmDel===d.id&&(
                    <span style={{marginLeft:6,display:"flex",gap:4}}>
                      <button style={{...S.btnS,background:"#dc2626",color:"#fff"}} onClick={function(){delDonor(d.id);setConfirmDel(null);}}>OK</button>
                      <button style={S.btnS} onClick={function(){setConfirmDel(null);}}>No</button>
                    </span>
                  )}
                </div>
              );
            })}
          </div>
        </div>
      )}

      {tab==="contrib"&&(
        <div style={S.card}>
          <div style={S.cardH}>Add / Edit Contribution</div>
          <div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:16}}>
            <select style={S.sel} value={selId||""} onChange={function(e){setSelId(Number(e.target.value)||null);}}>
              <option value="">Select donor</option>
              {donors.map(function(d){return <option key={d.id} value={d.id}>{d.name}</option>;})}
            </select>
            <select style={S.sel} value={yr} onChange={function(e){setYr(e.target.value);}}>
              {[2024,2025,2026,2027].map(function(y){return <option key={y}>{y}</option>;})}
            </select>
            <select style={S.sel} value={mo} onChange={function(e){setMo(e.target.value);}}>
              {MN.map(function(m,i){return <option key={i} value={i+1}>{m}</option>;})}
            </select>
            <input style={{...S.sel,minWidth:110}} placeholder="Amount" value={amt} onChange={function(e){setAmt(e.target.value);}} />
            <button style={S.btnP} onClick={function(){if(!selId||!amt)return;upsert(selId,Number(yr),Number(mo),parseInt(String(amt).replace(/,/g,"")));setAmt("");}}>Save</button>
          </div>
          {selId&&selContribs.map(function(c){
            return (
              <div key={c.year+"-"+c.month} style={S.topRow}>
                <span style={{flex:1}}>{MN[c.month-1]} {c.year}</span>
                <span style={{color:"#6366f1",fontWeight:600,marginRight:8}}>{fmt(c.amount)}</span>
                <button style={{...S.btnS,background:"#fee2e2",color:"#dc2626"}} onClick={function(){delContrib(selId,c.year,c.month);}}>Del</button>
              </div>
            );
          })}
        </div>
      )}

      {tab==="photo"&&(
        <div style={S.card}>
          <div style={S.cardH}>Certificate Photo Upload</div>
          <p style={{color:"#64748b",fontSize:13,marginBottom:12}}>
            အလှူရှင် နှင့် လ ရွေးပြီး ဓာတ်ပုံ တင်ပါ
          </p>
          <div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:16}}>
            <select style={S.sel} value={selId||""} onChange={function(e){setSelId(Number(e.target.value)||null);}}>
              <option value="">Select donor</option>
              {donors.map(function(d){return <option key={d.id} value={d.id}>{d.name}</option>;})}
            </select>
            <select style={S.sel} value={yr} onChange={function(e){setYr(e.target.value);}}>
              {[2024,2025,2026,2027].map(function(y){return <option key={y}>{y}</option>;})}
            </select>
            <select style={S.sel} value={mo} onChange={function(e){setMo(e.target.value);}}>
              {MN.map(function(m,i){return <option key={i} value={i+1}>{m}</option>;})}
            </select>
          </div>

          {selId&&(
            <div>
              {photos[pKey(selId,Number(yr),Number(mo))]&&(
                <div style={{marginBottom:12}}>
                  <div style={{fontSize:12,color:"#64748b",marginBottom:6}}>Current photo:</div>
                  <img src={photos[pKey(selId,Number(yr),Number(mo))]} alt="current"
                    style={{maxWidth:200,maxHeight:160,borderRadius:10,border:"2px solid #6366f1",objectFit:"cover",display:"block",marginBottom:8}} />
                  <button style={{...S.btnS,background:"#fee2e2",color:"#dc2626"}} onClick={function(){setPhoto(selId,Number(yr),Number(mo),"");setPUrl("");}}>Remove Photo</button>
                </div>
              )}
              <label style={{display:"inline-flex",alignItems:"center",gap:8,...S.btnP,cursor:"pointer",fontSize:13}}>
                {photos[pKey(selId,Number(yr),Number(mo))]?"Replace Photo":"Upload Photo"}
                <input type="file" accept="image/*" style={{display:"none"}} onChange={function(e){
                  const f=e.target.files[0];if(!f)return;
                  const r=new FileReader();
                  r.onload=function(ev){
                    setPhoto(selId,Number(yr),Number(mo),ev.target.result);
                  };
                  r.readAsDataURL(f);
                }} />
              </label>
            </div>
          )}

          {selId&&(
            <div style={{marginTop:20}}>
              <div style={{fontSize:13,fontWeight:700,color:"#334155",marginBottom:10}}>All Photos</div>
              <div style={{display:"flex",flexWrap:"wrap",gap:10}}>
                {selContribs.map(function(c){
                  const pk=pKey(selId,c.year,c.month),pu=photos[pk];
                  return (
                    <div key={pk} style={{textAlign:"center"}}>
                      {pu?(
                        <img src={pu} alt={MN[c.month-1]} style={{width:70,height:70,objectFit:"cover",borderRadius:8,border:"2px solid #6366f1",cursor:"pointer"}}
                          onClick={function(){dlImage(pu,MN[c.month-1]+c.year+".jpg");}} />
                      ):(
                        <div style={{width:70,height:70,borderRadius:8,background:"#f1f5f9",display:"flex",alignItems:"center",justifyContent:"center",color:"#cbd5e1",fontSize:20}}>+</div>
                      )}
                      <div style={{fontSize:10,color:"#64748b",marginTop:3}}>{MN[c.month-1]} {c.year}</div>
                    </div>
                  );
                })}
              </div>
            </div>
          )}
        </div>
      )}

      {tab==="csv"&&(
        <div style={S.card}>
          <div style={S.cardH}>CSV Import</div>
          <p style={{color:"#64748b",fontSize:13}}>Format: No,Name,Total Paid</p>
          <input type="file" accept=".csv" onChange={function(e){
            const f=e.target.files[0];if(!f)return;
            const r=new FileReader();
            r.onload=function(ev){
              const lines=ev.target.result.trim().split("\n").slice(1);
              const nd=[...donors];let added=0;
              lines.forEach(function(line){
                const parts=line.split(","),name=parts[1]&&parts[1].trim();
                if(!name)return;
                if(!nd.find(function(d){return d.name===name;})){
                  nd.push({id:Math.max(0,...nd.map(function(d){return d.id;}))+1,name,active:true});added++;
                }
              });
              // Note: setDonors not available here, handle via prop if needed
              alert(added+" donors would be added (reload to apply via seed)");
            };
            r.readAsText(f,"UTF-8");
          }} />
        </div>
      )}
    </div>
  );
}
